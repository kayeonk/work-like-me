name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile all scripts (syntax)
        run: python -m py_compile plugins/work-like-me/scripts/*.py
      - name: Run tests (no external deps)
        run: |
          for t in tests/test_*.py; do
            echo "=== $t ==="
            python "$t"
          done
